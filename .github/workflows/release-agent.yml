name: Release Local Agent

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Configuration
        run: node scripts/inject-config.js
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}

      - name: Build NSIS installer (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis --publish never

      - name: Build NSIS-Web installer (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis-web --publish never

      - name: Inspect build artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "=== dist/ contents ==="
          Get-ChildItem -Path dist -File | Sort-Object Length -Descending | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,2)}} | Format-Table

          $expected = @(
            "ScreensWebAgent-Setup-*.exe",
            "ScreensWebAgent-installer.exe",
            "local-agent-*.nsis.7z",
            "latest.yml"
          )
          $missing = @()
          foreach ($p in $expected) {
            if (-not (Get-ChildItem -Path dist -Filter $p -File -ErrorAction SilentlyContinue)) {
              $missing += $p
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing expected artifacts: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All expected artifacts present"

      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter "ScreensWebAgent-Setup-*.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "Installer not found in dist/"; exit 1 }

          Write-Host "=== Installing $($installer.Name) silently ==="
          $installProc = Start-Process -FilePath $installer.FullName -ArgumentList "/S","/D=$env:LOCALAPPDATA\Programs\ScreensWebAgent" -Wait -PassThru
          Write-Host "Installer exit code: $($installProc.ExitCode)"
          Start-Sleep -Seconds 3

          $exe = $null
          foreach ($base in @("$env:LOCALAPPDATA\Programs", "$env:ProgramFiles", "${env:ProgramFiles(x86)}")) {
            if (Test-Path $base) {
              $found = Get-ChildItem $base -Recurse -Filter "screens-web-agent.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $exe = $found.FullName; break }
            }
          }
          if (-not $exe) { Write-Error "Could not locate installed exe"; exit 1 }
          Write-Host "=== Installed exe: $exe ==="

          $stdoutFile = "$env:TEMP\agent-stdout.log"
          $stderrFile = "$env:TEMP\agent-stderr.log"
          $proc = Start-Process -FilePath $exe -ArgumentList "--enable-logging" -PassThru -RedirectStandardOutput $stdoutFile -RedirectStandardError $stderrFile
          Start-Sleep -Seconds 10

          Write-Host "=== STDOUT ==="
          if (Test-Path $stdoutFile) { Get-Content $stdoutFile | Select-Object -First 100 }
          Write-Host "=== STDERR ==="
          if (Test-Path $stderrFile) { Get-Content $stderrFile | Select-Object -First 100 }

          $stdoutContent = if (Test-Path $stdoutFile) { Get-Content $stdoutFile -Raw } else { "" }
          $bootMarker = $stdoutContent -match "\[INIT\]: ScreensWeb Agent starting"
          $fatalError = $stdoutContent -match "FATAL BOOTSTRAP ERROR|Cannot find module"

          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

          if ($fatalError) { Write-Error "FATAL error during boot — release blocked"; exit 1 }
          if (-not $bootMarker) { Write-Error "App did not reach [INIT] marker — release blocked"; exit 1 }
          Write-Host "Smoke test passed"

      - name: Publish (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          $TAG = "v$VERSION"
          $patterns = @(
            "ScreensWebAgent-Setup-*.exe",
            "ScreensWebAgent-Setup-*.exe.blockmap",
            "ScreensWebAgent-installer.exe",
            "local-agent-*.nsis.7z",
            "local-agent-*.nsis.7z.blockmap",
            "latest.yml"
          )
          Write-Host "=== Contents of dist/ ==="
          Get-ChildItem -Path dist -File | Format-Table Name, Length
          $artifacts = @()
          foreach ($p in $patterns) {
            $artifacts += Get-ChildItem -Path dist -Filter $p -File -ErrorAction SilentlyContinue
          }
          if ($artifacts.Count -eq 0) { Write-Error "No artifacts found to upload"; exit 1 }
          Write-Host "=== Artifacts to upload ==="
          $artifacts | ForEach-Object { Write-Host " - $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)" }
          gh release upload $TAG ($artifacts | Select-Object -ExpandProperty FullName) --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install Xvfb (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y xvfb

      - name: Build dir (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --dir

      - name: Smoke test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          exe="dist/linux-unpacked/screens-web-agent"
          if [ ! -f "$exe" ]; then echo "Binary not found: $exe"; exit 1; fi
          chmod +x "$exe"
          Xvfb :99 -screen 0 1024x768x24 &
          XVFB_PID=$!
          DISPLAY=:99 "$exe" --no-sandbox > /tmp/agent-stdout.log 2>&1 &
          APP_PID=$!
          sleep 10
          echo "=== STDOUT ==="
          head -100 /tmp/agent-stdout.log || true
          kill $APP_PID 2>/dev/null
          kill $XVFB_PID 2>/dev/null
          if grep -q "FATAL BOOTSTRAP ERROR\|Cannot find module" /tmp/agent-stdout.log; then
            echo "FATAL error during boot — release blocked"; exit 1
          fi
          if ! grep -q "\[INIT\]: ScreensWeb Agent starting" /tmp/agent-stdout.log; then
            echo "App did not reach [INIT] marker — release blocked"; exit 1
          fi
          echo "Smoke test passed"

      - name: Build and Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux deb AppImage --arm64 --armv7l --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

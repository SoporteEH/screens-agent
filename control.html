<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="./css/theme.css">
    <link rel="stylesheet" href="./css/control.css">
</head>

<body>
    <div class="title-bar">
        <span class="title-bar-text">Control Panel</span>
        <div class="title-bar-controls">
            <div class="title-bar-button" id="btn-minimize">
                <span class="material-icons">minimize</span>
            </div>
            <div class="title-bar-button close" id="btn-window-close">
                <span class="material-icons">close</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="content-wrapper">
            <div class="header">
                <div class="logo">
                    <span class="material-icons">grid_view</span>
                </div>
                <div id="device-name" class="title">PC CUOTAS</div>
                <span class="version-badge" id="agent-version"></span>
            </div>

            <div class="card">
                <div class="status-section">
                    <span class="status-label">Estado</span>
                    <div class="status-badge" id="status-container">
                        <div class="status-dot"></div>
                        <span class="status-text" id="agent-status">Online</span>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" id="btn-restart">
                        <span class="material-icons">restart_alt</span>
                        <span>Reiniciar</span>
                    </button>

                    <button class="btn btn-secondary" id="btn-update">
                        <span id="update-btn-text">
                            <span class="material-icons">sync</span>
                            <span>Verificando...</span>
                        </span>
                        <span id="update-spinner" class="spinner" style="display: none;"></span>
                    </button>

                    <button class="btn btn-danger" id="btn-quit">
                        <span class="material-icons">power_settings_new</span>
                        <span>Cerrar App</span>
                    </button>
                </div>
            </div>

            <div class="footer">
                <div class="footer-text">ScreensWeb Agent © <span id="current-year"></span></div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-message" id="modal-message"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancelar</button>
                <button class="modal-btn modal-btn-confirm" id="modal-confirm">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="./js/control.js"></script>
</body>

</html>
